<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الجمعيات الذكي</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2953/2953363.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2953/2953363.png">
    <!-- لون شريط الحالة في الموبايل -->
    <meta name="theme-color" content="#2c5364">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- تحميل مكتبات فيربيس (الإصدار 8 المتوافق مع الكود السابق) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- مكتبة Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("تطبيق الجمعية جاهز للتنصيب!"))
                .catch(err => console.log("خطأ في التسجيل", err));
        }
    </script>
</head>

<body>

    <div class="glass-container">
        <!-- القائمة الجانبية -->
        <nav class="sidebar" id="sidebar">
            <h2>الجمعية الذكية 💰</h2>
            <ul>
                <li onclick="showSection('home')">🏠 <span>الرئيسية</span></li>
                <li onclick="showSection('add-new')">➕ <span>جديدة</span></li>
                <!-- يمكنك إضافة زر للتصدير هنا أيضاً لسهولة الوصول -->
            </ul>
        </nav>

        <main class="content">
            <!-- 1. الصفحة الرئيسية: عرض الجمعيات -->
            <section id="home" class="page active">
                <h1>الجمعيات الحالية</h1>
                <div id="assoc-grid" class="grid-container">
                    <!-- الكروت ستظهر هنا عبر JS -->
                </div>
            </section>

            <!-- 2. صفحة إضافة جمعية جديدة -->
            <section id="add-new" class="page">
                <h1>إنشاء جمعية جديدة</h1>
                <div class="glass-card">
                    <input type="text" id="nameInp" placeholder="اسم الجمعية">
                    <input type="number" id="amountInp" placeholder="المبلغ الشهري للفرد">
                    <input type="number" id="monthsInp" placeholder="عدد الشهور">
                    <input type="date" id="dateInp" title="تاريخ البدء">
                    <button onclick="createNewAssoc()">حفظ ونشر</button>
                </div>
            </section>

            <!-- 3. صفحة إدارة جمعية محددة (تظهر عند الضغط على كرت) -->
            <section id="manage-single" class="page">
                <button class="back-btn" onclick="showSection('home')">⬅ عودة</button>
                <h1 id="selected-assoc-title">اسم الجمعية</h1>
                <div class="info-bar">
                    <span id="total-pool">إجمالي القبض: 0</span>
                    <button class="export-btn" onclick="exportData()">📥 تصدير إكسيل</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 5%;">#</th>
                                <th style="width: 20%;">الاسم</th>
                                <th style="width: 15%;">شهر الاستحقاق</th>
                                <th style="width: 20%;">المبلغ الشهري / الإجمالي</th> <!-- التعديل هنا -->
                                <th style="width: 15%;">موعد التحصيل/القبض</th>
                                <th style="width: 10%;">ترتيب يدوي</th>
                                <th style="width: 15%;">الحالة</th>
                                <th style="width: 15%;">عمليات</th>
                            </tr>
                        </thead>
                        <tbody id="members-table-body">
                            <!-- البيانات ستنزل هنا ومحاذاتها ستكون مضبوطة -->
                        </tbody>
                    </table>
                </div>
                <div class="add-member-form">
                    <input type="text" id="memberName" placeholder="اسم المشترك الجديد">
                    <div class="actions-bar">
                        <button onclick="addMember()" style="background:#27ae60;">➕ إضافة مشترك</button>
                        <button onclick="exportData()" style="background:#16a085;">📥 تصدير إكسيل</button>
                        <button class="shuffle-btn" onclick="runLottery()" style="background:#f1c40f; color:#000;">🎲
                            إجراء قرعة عشوائية</button>
                    </div>
                </div>


            </section>
        </main>
    </div>

    <!-- كود الفيربيس (ضعه هنا) -->
    <script src="app.js"></script>
</body>

</html>
